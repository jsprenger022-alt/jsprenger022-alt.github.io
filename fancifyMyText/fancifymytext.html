<!doctype html>
<html lang="en-US">
  <head>
    <title>Fancify Shamcify</title>
    <!-- link to your script file here -->
    <script async src="scripts/fancifymytext.js"></script>
  </head>

  <body>
    <h1>Fancify my Text</h1>
    <!-- Your UI controls go here -->
    <fieldset>
      <legend>Text</legend>
      <textarea
        id="firstTextArea"
        name="Text"
        rows="4"
        cols="30"
        placeholder="Enter your text here"
      ></textarea
      ><br />
    </fieldset>

    <fieldset>
      <button type="button" onclick="makeBig()">Bigger!</button>
      <button type="button" onclick="makeUpper()">Moo</button>


      <p>
        <input
          type="radio"
          id="FancyShmancy"
          onchange="makeBold()"
          name="Fancify"
          value="FancyShmancy"
        />
        <label for="FancyShmancy">FancyShmancy</label><br />

        <input
          type="radio"
          id="BoringBetty"
          onchange="makeNorm()"
          name="Fancify"
          value="BoringBetty"
        />
        <label for="BoringBetty">BoringBetty</label><br />
      </p>
    </fieldset>
  </body>
</html>
